<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Exact Web Primary HSL(28, 80%, 52%) color -->
  <rect width="32" height="32" rx="9" fill="hsl(28, 80%, 52%)" />
  
  <g fill="#ffffff">
    <!-- Shutter button -->
    <rect x="9" y="9.5" width="2" height="1.5" rx="0.5" />
    
    <!-- Top prism -->
    <path d="M13 11.5 L14.2 9.5 A1 1 0 0 1 15 9 H17 A1 1 0 0 1 17.8 9.5 L19 11.5 Z" />
    
    <!-- Camera Body -->
    <rect x="6" y="11.5" width="20" height="12" rx="2.5" />
  </g>
  
  <!-- Lens Outer Circle (Cutout) -->
  <circle cx="16" cy="17.5" r="4.2" fill="hsl(28, 80%, 52%)" />
  
  <!-- Lens Inner Glass (White) -->
  <circle cx="16" cy="17.5" r="2.5" fill="#ffffff" />
  
  <!-- Small Lens Reflection -->
  <circle cx="17.5" cy="16" r="0.7" fill="hsl(28, 80%, 52%)" />
  
  <!-- Small Flash LED -->
  <circle cx="22.5" cy="13.8" r="0.8" fill="hsl(28, 80%, 52%)" />
</svg>
